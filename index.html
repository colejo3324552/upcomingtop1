<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardest Upcoming Top 1's</title>
    <style>
        :root {
            --bg: #060608;
            --panel: #0d0d12;
            --border: rgba(255, 255, 255, 0.05);
            --text: #f3f4f6;
            --text-sub: #8e939e;
            --accent: #ef4444;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
        }
        h1 { grid-column: 1 / -1; margin: 0 0 10px 0; font-size: 32px; font-weight: 800; letter-spacing: -0.03em; }
        .list-wrapper { display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .card:hover { border-color: rgba(255,255,255,0.15); background: #121218; }
        .num { font-size: 36px; font-weight: 900; color: #ffffff; font-style: italic; line-height: 1; }
        .details { flex: 1; }
        .name { font-size: 22px; font-weight: 700; margin: 0 0 4px 0; letter-spacing: -0.01em; }
        .meta { color: var(--text-sub); font-size: 14px; }
        .meta strong { color: var(--text); }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            display: none;
            height: fit-content;
        }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; margin: 16px 0; background: #000; }
        .desc { font-size: 14px; line-height: 1.6; color: #cbd5e1; margin: 0 0 20px 0; }
        .btn {
            display: block; width: 100%; padding: 12px; background: var(--accent); color: white;
            border: none; border-radius: 8px; font-weight: 700; text-align: center; text-decoration: none; box-sizing: border-box; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hardest Upcoming Top 1's</h1>
    
    <div class="list-wrapper">
        <div class="card" onclick="showLevel('aeternus')">
            <div class="num">1</div>
            <div class="details">
                <div class="name" style="color: #4c1d95;">Aeternus</div>
                <div class="meta">Published by <strong>Riot</strong></div>
            </div>
        </div>
        <div class="card" onclick="showLevel('angelicide')">
            <div class="num">2</div>
            <div class="details">
                <div class="name" style="color: #ffb6c1;">Angelicide</div>
                <div class="meta">Created by <strong>LexyCat</strong></div>
            </div>
        </div>
    </div>

    <div class="panel" id="panel">
        <h2 id="p-name" style="margin:0 0 4px 0; font-size: 24px; font-weight: 800;"></h2>
        <div id="p-meta" class="meta" style="margin-bottom: 15px;"></div>
        <img id="p-thumb" class="thumb" src="" alt="Preview">
        <p id="p-desc" class="desc"></p>
        <a id="p-btn" class="btn" href="" target="_blank">Watch Showcase</a>
    </div>
</div>

<script>
    const data = {
        aeternus: {
            n: "Aeternus", color: "#4c1d95", m: "Published by <strong>Riot</strong> • Verifier: <strong>Diamond</strong>", btnBg: "#ef4444", v: "3gU-Rrcm78M",
            d: "The ultimate unreleased hell-themed gauntlet designed to test the absolute boundaries of human precision. Serving as the direct spiritual successor to Bloodbath, it features tight, frame-perfect micro-timings and ruthless ship/wave corridors built to dominate the extreme meta."
        },
        angelicide: {
            n: "Angelicide", color: "#ffb6c1", m: "Created by <strong>LexyCat</strong>", btnBg: "#db2777", v: "x7mC8-0zYBc",
            d: "A stunningly dense apocalyptic and angelic themed mega-collaboration managed by LexyCat. It introduces complex rhythmic layouts, visually striking aesthetics, and heavy mechanical wave precision built to contest the top spots."
        }
    };

    function showLevel(key) {
        const l = data[key];
        document.getElementById('p-name').innerText = l.n;
        document.getElementById('p-name').style.color = l.color;
        document.getElementById('p-meta').innerHTML = l.m;
        document.getElementById('p-desc').innerText = l.d;
        document.getElementById('p-thumb').src = `https://i.ytimg.com/vi/${l.v}/hqdefault.jpg`;
        document.getElementById('p-btn').href = `https://www.youtube.com/watch?v=${l.v}`;
        document.getElementById('p-btn').style.background = l.btnBg;
        document.getElementById('panel').style.display = 'block';
    }
</script>

</body>
</html>
